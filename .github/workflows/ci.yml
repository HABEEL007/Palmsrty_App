name: CI (Continuous Integration)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COREPACK_ENABLE_STRICT: 0

permissions:
  contents: read
  packages: write

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 9.15.9
          
      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Workspace)
        run: pnpm lint
        continue-on-error: true

      - name: Build (Workspace)
        run: pnpm build

  docker-build:
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    strategy:
      matrix:
        service: [api-gateway, ai-service, image-service, keep-alive, ad-service, reading-service, report-service]
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: repo_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/palmistry-${{ matrix.service }}:latest
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/palmistry-${{ matrix.service }}:${{ github.sha }}
