name: Deployment

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration Tests
        run: pnpm turbo run test:integration

      - name: Blue/Green Deployment
        run: |
          echo "Deploying to production (Blue/Green toggle)..."
          # Example strategy: 
          # 1. Deploy new containers with 'green' tag
          # 2. Wait for health checks
          # 3. Switch Nginx/ALB to point to green
          # 4. Remove old 'blue' containers

      - name: Smoke Tests
        run: |
          echo "Running smoke tests..."
          curl -f https://app.palmistry.ai/health

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "Deployment to Production: ${{ job.status }}",
              "attachments": [
                {
                  "color": "${{ job.status == 'success' && '#36a64f' || '#ff0000' }}",
                  "title": "Build Details",
                  "fields": [
                    { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                    { "title": "Branch", "value": "${{ github.ref }}", "short": true }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
